name: Build NXGS Gaming AppImage Compatibility

on:
  workflow_dispatch:

jobs:
  build-appimage_compat_x64:
    name: Build compatibility NXGS Gaming appimage_x64
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Podman
        run: |
          sudo apt update
          sudo apt-get -y install podman

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: 'chiaki-ng'

      - name: Add QmlWebEngine Import
        working-directory: chiaki-ng
        run: |
          cp scripts/qtwebengine_import.qml gui/src/qml/
      - name: Run build script
        working-directory: chiaki-ng/scripts
        run: |
          ./run-podman-build-compatibility-appimage.sh

      - name: Upload NXGS Gaming Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nxgs-gaming-compatibility.AppImage
          path: chiaki-ng/appimage/nxgs-gaming-compatibility.AppImage
          if-no-files-found: error
          retention-days: 7
